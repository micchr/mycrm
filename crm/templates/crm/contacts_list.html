{% extends "base.html" %}
{% block content %}

<h2>Contacts</h2>

<a href="/contacts/add/" class="btn btn-primary mb-3">Ajouter un contact</a>

<table class="table table-striped">
<tr>
    <th>Nom</th>
    <th>Email</th>
    <th>Téléphone</th>
    <th>Client</th>
    <th>Actions</th>
</tr>

{% for c in contacts %}
<tr>
    <td>{{ c.name }}</td>
    <td>{{ c.email }}</td>
    <td>{{ c.phone }}</td>
    <td>{{ c.client.name }}</td>
    <td>
        <a href="/contacts/{{ c.id }}/edit/" class="btn btn-warning btn-sm">Modifier</a>
        <a href="/contacts/{{ c.id }}/delete/" class="btn btn-danger btn-sm">Supprimer</a>
    </td>
</tr>
{% empty %}
<tr>
<td colspan="4">Aucun contact.</td>
</tr>
{% endfor %}
</table>

{% endblock %}
