<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>CRM Django</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" 
          rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">

        <a class="navbar-brand" href="/">CRM</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

            <ul class="navbar-nav me-auto">

                {% if user.is_authenticated %}

                <li class="nav-item">
                    <a class="nav-link" href="/clients/">Clients</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/contacts/">Contacts</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/opportunities/">Opportunités</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/tasks/">Tâches</a>
                </li>

                {% endif %}

            </ul>

            <ul class="navbar-nav">

                {% if user.is_authenticated %}

                <li class="nav-item">
                    <form action="/logout/" method="POST" class="d-inline">
                        {% csrf_token %}
                        <button type="submit"
                                class="nav-link btn btn-link p-0 m-0"
                                style="color: rgba(255,255,255,.55); text-decoration:none;"
                                onmouseover="this.style.color='white'"
                                onmouseout="this.style.color='rgba(255,255,255,.55)'">
                            Déconnexion
                        </button>
                    </form>
                </li>

                {% else %}

                <li class="nav-item">
                    <a class="nav-link" href="/login/">Connexion</a>
                </li>

                {% endif %}

            </ul>

        </div>
    </div>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
